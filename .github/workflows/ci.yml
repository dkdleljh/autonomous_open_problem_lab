name: ci

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: 파이썬 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .[dev]

      - name: Lean 설치
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: LaTeX 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-base texlive-latex-recommended texlive-fonts-recommended

      - name: 정적 검사
        run: ruff check aopl tests scripts

      - name: 운영 준비도 strict 검사
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
        run: python -m aopl doctor --root . --profile ci --strict

      - name: 테스트 실행
        run: pytest -q

      - name: 무인 파이프라인 샘플 실행
        run: python -m aopl run-all --limit 1 --root .

      - name: 실행 요약 아티팩트 업로드
        uses: actions/upload-artifact@v7
        with:
          name: ci-audit-summary
          path: |
            data/audit_logs/last_run_summary.json
            data/audit_logs/pipeline_audit.jsonl
