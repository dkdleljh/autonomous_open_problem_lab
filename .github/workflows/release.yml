name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "릴리즈 태그"
        required: false
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 파이썬 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .[dev]

      - name: Lean 설치
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: LaTeX 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-base texlive-latex-recommended texlive-fonts-recommended

      - name: 운영 준비도 strict 검사
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
        run: python -m aopl doctor --root . --profile github_release --strict

      - name: 테스트 실행
        run: pytest -q

      - name: 문서 및 파이프라인 검증
        run: |
          python -m aopl run-all --limit 1 --root .
          python -m aopl submission --root .

      - name: 릴리즈 노트 생성
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          if [ -z "$TAG_NAME" ]; then TAG_NAME=${{ inputs.tag }}; fi
          python scripts/release/generate_release_notes.py --tag "$TAG_NAME" --output data/paper_assets/releases/release_notes_generated.md

      - name: 릴리즈 자산 업로드
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          if [ -z "$TAG_NAME" ]; then TAG_NAME=${{ inputs.tag }}; fi
          gh release edit "$TAG_NAME" --repo "${{ github.repository }}" --notes-file data/paper_assets/releases/release_notes_generated.md
          gh release upload "$TAG_NAME" \
            data/paper_assets/releases/*.zip \
            data/paper_assets/releases/*.tar.gz \
            data/paper_assets/releases/*checksums.txt \
            papers/builds/*.pdf \
            papers/builds/*paper_manifest.json \
            --repo "${{ github.repository }}" \
            --clobber
