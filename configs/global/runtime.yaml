project_name: autonomous_open_problem_lab
autonomous_mode: true
default_timezone: Asia/Seoul
max_parallel_problems: 2
max_retry_per_stage: 2
resource_budget:
  cpu_minutes_per_problem: 20
  memory_mb_per_problem: 2048
  wall_clock_minutes_per_problem: 45
gates:
  harvest_min_reliability: 0.75
  paper_require_bilingual_sync: true
  release_require_checksum: true
auto_stop_conditions:
  logical_gap_critical: true
  reference_conflict_critical: true
  formalization_collapse_critical: true
  counterexample_on_strong_form_critical: true
